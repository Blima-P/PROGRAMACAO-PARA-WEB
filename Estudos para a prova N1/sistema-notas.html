<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas - Exercício 3</title>
    <!-- Vinculando CSS externo -->
    <link rel="stylesheet" href="sistema-notas.css">
</head>
<body>
    <div class="container">
        <h1>📚 Sistema de Notas</h1>
        
        <form id="formNota">
            <label for="nota">Digite uma nota (0 a 10):</label>
            <input type="number" id="nota" min="0" max="10" step="0.1" placeholder="Ex: 7.5" required>
            
            <button type="submit" class="btn-adicionar">➕ Adicionar Nota</button>
            <button type="button" class="btn-remover" onclick="removerUltima()">➖ Remover Última</button>
        </form>
        
        <h3>📋 Notas adicionadas:</h3>
        <div id="listaNotas">Nenhuma nota adicionada</div>
        
        <div class="botoes-container">
            <button class="btn-calcular" onclick="calcularMedia()">📊 Calcular Média</button>
            <button class="btn-limpar" onclick="limparTudo()">🗑️ Limpar Tudo</button>
        </div>
        
        <div id="resultado"></div>
    </div>
    
    <script src="sistema-notas.js"></script>
</body>
</html>
