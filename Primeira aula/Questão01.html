<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Formulário com JavaScript</title>
    <script src="Questão01.js" defer></script>
</head>

<body>
    <h1>Calculadora de Quadrado</h1>
    <form id="numeroForm">
        <label for="numero">Digite um número:</label>
        <input type="number" id="numero" name="numero" required>
        <button type="submit">Calcular Quadrado e Cubo</button>
    </form>
    <p>O Quadrado é: <span id="resultadoQuadrado"></span></p>
    <p>O Cubo é: <span id="resultadoCubo"></span></p>
</body>

</html>
